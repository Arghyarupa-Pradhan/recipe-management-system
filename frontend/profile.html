<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile - RecipeHub</title>
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body>
  <nav>
    <a class="nav-logo" href="/index.html">🍽 RecipeHub</a>
    <div class="nav-links">
      <a href="/search.html">Search</a>
      <a href="/saved.html">Saved</a>
      <a href="/profile.html">Profile</a>
      <a href="#" id="nav-logout" class="btn btn-outline">Logout</a>
    </div>
  </nav>

  <div class="container">
    <h1 class="section-title">My Profile</h1>
    <form id="profile-form">
      <div class="profile-grid">

        <div class="profile-section">
          <h2>Basic Info</h2>
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="Your name" />
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" disabled style="background:#f3f4f6; cursor:not-allowed;" />
          </div>
          <div class="form-group">
            <label>Cooking Skill Level</label>
            <select id="skill_level">
              <option value="beginner">Beginner</option>
              <option value="intermediate">Intermediate</option>
              <option value="advanced">Advanced</option>
            </select>
          </div>
        </div>

        <div class="profile-section">
          <h2>Dietary Preferences</h2>
          <div class="checkbox-group" id="dietary-options"></div>
        </div>

        <div class="profile-section">
          <h2>Allergies</h2>
          <div class="checkbox-group" id="allergy-options"></div>
        </div>

        <div class="profile-section">
          <h2>Ingredient Preferences</h2>
          <div id="ingredient-list"></div>
          <div class="ingredient-add-row">
            <input type="text" id="ingredient-input" placeholder="e.g. garlic" />
            <select id="ingredient-type">
              <option value="include">Include</option>
              <option value="exclude">Exclude</option>
            </select>
            <button type="button" class="btn btn-outline btn-sm" id="add-ingredient">+ Add</button>
          </div>
        </div>

      </div>

      <div style="text-align:center; margin-top:2rem;">
        <button type="submit" class="btn btn-primary" style="min-width:200px;">Save Profile</button>
      </div>
    </form>
  </div>

  <script type="module">
    import { logout } from '/js/utils.js';
    document.getElementById('nav-logout').addEventListener('click', logout);
  </script>
  <script type="module" src="/js/profile.js"></script>
</body>
</html>
