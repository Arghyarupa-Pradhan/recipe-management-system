<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - RecipeHub</title>
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body>
  <nav>
    <a class="nav-logo" href="/index.html">🍽 RecipeHub</a>
    <div class="nav-links">
      <a href="/login.html" class="btn btn-outline">Login</a>
    </div>
  </nav>

  <div class="container">
    <div class="form-card">
      <h1>Create Account</h1>
      <form id="register-form">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="Your name" required />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Min. 6 characters" required />
        </div>
        <div class="form-group">
          <label for="skill_level">Cooking Skill Level</label>
          <select id="skill_level">
            <option value="beginner">Beginner</option>
            <option value="intermediate">Intermediate</option>
            <option value="advanced">Advanced</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">Create Account</button>
      </form>
      <p class="form-footer">Already have an account? <a href="/login.html">Login here</a></p>
    </div>
  </div>

  <script type="module" src="/js/auth.js"></script>
</body>
</html>
